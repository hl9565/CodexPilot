name: Create release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.5"
        required: true
        type: string
      prerelease:
        description: "Mark this release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: read

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          prerelease_args=()
          if [ "$PRERELEASE" = "true" ]; then
            prerelease_args+=(--prerelease)
          fi

          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --verify-tag \
              --generate-notes \
              "${prerelease_args[@]}"
          else
            gh release create "$TAG_NAME" \
              --target "$GITHUB_SHA" \
              --generate-notes \
              "${prerelease_args[@]}"
          fi
